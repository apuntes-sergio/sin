name: Deploy slides
on:
  push:
    branches: [main]
    paths:
      - 'slides/**'
      - 'mkslides.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install omegaconf mkslides

      - name: Build slides
        run: |
          # 1. Limpieza total
          rm -rf site
          
          # 2. Construcción respetando carpetas
          mkslides build --config-file mkslides.yml slides
          
          # 3. EL ARREGLO DEFINITIVO DE RUTAS
          # Buscamos todos los .html y cambiamos las rutas absolutas por relativas
          # Esto hace que funcionen tanto en la raíz como en UD00, UD01, etc.
          find site -name "*.html" -exec sed -i 's|href="/mkslides-assets|href="../mkslides-assets|g' {} +
          find site -name "*.html" -exec sed -i 's|src="/mkslides-assets|src="../mkslides-assets|g' {} +
          
          # Caso especial para el index de la raíz (si existe)
          if [ -f site/index.html ]; then
            sed -i 's|href="../mkslides-assets|href="./mkslides-assets|g' site/index.html
            sed -i 's|src="../mkslides-assets|src="./mkslides-assets|g' site/index.html
          fi

          touch site/.nojekyll

      - name: Deploy to sin-slides
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          external_repository: apuntes-sergio/sin-slides
          deploy_key: ${{ secrets.SLIDES_DEPLOY_KEY }}
          publish_branch: gh-pages
          force_push: true
          clean: true