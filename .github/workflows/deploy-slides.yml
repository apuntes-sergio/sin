name: Deploy slides
on:
  push:
    branches: [main]
    paths:
      - 'slides/**'
      - 'mkslides.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install omegaconf mkslides

      - name: Build slides
        run: |
          # 1. Limpieza total
          rm -rf site
          
          # 2. Construcción (mkslides a veces aplana si solo hay un archivo por carpeta)
          mkslides build --config-file mkslides.yml slides
          
          # 3. RECONSTRUCCIÓN DE ESTRUCTURA (Para forzar UD00, UD01, etc.)
          # Buscamos archivos .md en tus subcarpetas de origen y aseguramos que tengan carpeta en el destino
          cd slides
          for dir in UD*/; do
            dir=${dir%/} # Quitar la barra final
            if [ -d "$dir" ]; then
              mkdir -p ../site/$dir
              # Si mkslides generó un html con el nombre de la carpeta en la raíz, lo movemos dentro como index.html
              if [ -f "../site/$dir.html" ]; then
                mv "../site/$dir.html" "../site/$dir/index.html"
              # Si mkslides ya generó un index.html pero en el lugar equivocado
              elif [ -f "../site/index.html" ] && [ "$dir" == "UD00" ]; then
                cp "../site/index.html" "../site/$dir/index.html"
              fi
            fi
          done
          cd ..

          # 4. CORRECCIÓN DE RUTAS PARA SUBDOMINIOS Y CARPETAS
          # Esto arregla el CSS/JS para archivos dentro de UD00, UD01...
          find site -mindepth 2 -name "*.html" -exec sed -i 's|href="/mkslides-assets|href="../mkslides-assets|g' {} +
          find site -mindepth 2 -name "*.html" -exec sed -i 's|src="/mkslides-assets|src="../mkslides-assets|g' {} +
          
          # Esto arregla el CSS/JS para el index de la raíz
          if [ -f site/index.html ]; then
            sed -i 's|href="/mkslides-assets|href="./mkslides-assets|g' site/index.html
            sed -i 's|src="/mkslides-assets|src="./mkslides-assets|g' site/index.html
          fi

          touch site/.nojekyll

      - name: Deploy to sin-slides
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          external_repository: apuntes-sergio/sin-slides
          deploy_key: ${{ secrets.SLIDES_DEPLOY_KEY }}
          publish_branch: gh-pages
          force_push: true
          clean: true