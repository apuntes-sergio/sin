name: Deploy slides
on:
  push:
    branches: [main]
    paths:
      - 'slides/**'
      - 'mkslides.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install omegaconf mkslides

      - name: Build slides
        run: |
          # 1. Limpieza absoluta
          rm -rf site
          
          # 2. Construcción respetando la jerarquía
          # Ejecutamos mkslides indicando que el destino mantenga la estructura
          mkslides build --config-file mkslides.yml slides
          
          # 3. TRUCO DE SEGURIDAD: Si mkslides ha puesto el index en la raíz por error,
          # creamos la carpeta UD00 y lo movemos allí.
          if [ ! -d "site/UD00" ]; then
            mkdir -p site/UD00
            cp site/index.html site/UD00/index.html
          fi
          
          # 4. CORRECCIÓN DE RUTAS (Muy importante para el 404 de los estilos)
          # Ahora que estamos en una subcarpeta (UD00), los assets están un nivel arriba
          find site/UD00 -name "*.html" -exec sed -i 's|href="/mkslides-assets|href="../mkslides-assets|g' {} +
          find site/UD00 -name "*.html" -exec sed -i 's|src="/mkslides-assets|src="../mkslides-assets|g' {} +
          
          # 5. Para que la raíz del dominio no esté vacía, mantenemos un index en la raíz
          # pero arreglamos sus rutas también
          sed -i 's|href="/mkslides-assets|href="./mkslides-assets|g' site/index.html
          sed -i 's|src="/mkslides-assets|src="./mkslides-assets|g' site/index.html

          touch site/.nojekyll

      - name: Deploy to sin-slides
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          external_repository: apuntes-sergio/sin-slides
          deploy_key: ${{ secrets.SLIDES_DEPLOY_KEY }}
          publish_branch: gh-pages
          force_push: true
          clean: true